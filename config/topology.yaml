# Cluster topology configuration
# Copy to topology.yaml and adjust for your environment.

coordinator:
  host: "0.0.0.0"             # bind address for the REST API
  port: 8080
  llama_server_host: "127.0.0.1"  # llama-server binds here (coordinator-local only)
  llama_server_port: 8181
  llama_server_binary: "llama-server"   # full path if not in $PATH
  health_check_interval_seconds: 10
  worker_timeout_seconds: 30
  min_healthy_workers: 1       # refuse to start until at least N workers are healthy

workers:
  # ── Load balancing note ───────────────────────────────────────────────────
  # llama.cpp distributes model layers across workers *proportional to their
  # reported available memory*.  No manual tuning is required for basic use:
  # a workstation with 64 GB automatically gets far more layers than a phone
  # with 4 GB.
  #
  # mem_limit_mb (optional):
  #   0   → coordinator auto-computes from the worker's free RAM/VRAM
  #         at the moment it issues StartRPC (recommended default).
  #   N>0 → hard cap in MiB; useful to leave headroom or throttle a device.
  # ─────────────────────────────────────────────────────────────────────────

        # auto — uses VRAM if available, else RAM

  - id: "android-phone-lts"
    host: "192.168.178.47"     # WLAN IP of the Android device (check with: ip addr show wlan0)
    grpc_port: 50051
    rpc_port: 8765
    tags: ["arm64", "termux"]
    enabled: true            # set to true once the device is set up
    mem_limit_mb: 2048        # cap at 2 GB — leave room for Android OS

  - id: "android-phone-v2"
    host: "192.168.178.99"     # WLAN IP of the Android device (check with: ip addr show wlan0)
    grpc_port: 50051
    rpc_port: 8765
    tags: ["arm64", "termux"]
    enabled: true            # set to true once the device is set up
    mem_limit_mb: 2048  

  - id: "android-phone-v3"
    host: "192.168.178.98"     # WLAN IP of the Android device (check with: ip addr show wlan0)
    grpc_port: 50051
    rpc_port: 8765
    tags: ["arm64", "termux"]
    enabled: true            # set to true once the device is set up
    mem_limit_mb: 2048  

  - id: "android-tab-e"
    host: "192.168.178.64"     # WLAN IP of the Android device (check with: ip addr show wlan0)
    grpc_port: 50051
    rpc_port: 8765
    tags: ["arm64", "termux"]
    enabled: true            # set to true once the device is set up
    mem_limit_mb: 2048  

